# ============================================================
# AHMAD & CO. — Docker Compose
# Frontend (Nginx) + Backend (Node.js Express)
# ============================================================

services:
  # ── Frontend — Static site via Nginx ──────────────────────
  website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ahmadco-website
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "app=ahmadco-website"
      - "env=production"

  # ── Backend — Node.js Express API ─────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ahmadco-backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - FRONTEND_URL=http://localhost:8080
      - EMAIL_USER=${EMAIL_USER:-ahmad.dstech@gmail.com}
      - EMAIL_PASS=${EMAIL_PASS:-}
      - NOTIFY_EMAIL=${NOTIFY_EMAIL:-ahmad.dstech@gmail.com}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-ahmadco-admin-secret-2026}
    volumes:
      # Persist leads data across container restarts
      - leads_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "app=ahmadco-backend"
      - "env=production"

volumes:
  leads_data:
    driver: local
