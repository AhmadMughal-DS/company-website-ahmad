# ============================================================
# AHMAD & CO. — Docker Compose
# Local development + production deployment
# ============================================================

services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ahmadco-website
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "app=ahmadco-website"
      - "env=production"

