# ==============================================================
#  AHMAD & CO. — Nginx Configuration
#  File: website.conf
#  Domain: ahmadco.tech
#  Google 2025 SEO + Performance + Security Best Practices
# ==============================================================

# ── Upstream: Node.js Backend ──────────────────────────────────
upstream ahmadco_backend {
    server backend:3001;
    keepalive 32;
}

# ── HTTP → HTTPS Redirect ──────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ahmadco.tech www.ahmadco.tech;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP → HTTPS (301 permanent)
    location / {
        return 301 https://ahmadco.tech$request_uri;
    }
}

# ── WWW → Non-WWW Redirect ─────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ahmadco.tech;

    ssl_certificate     /etc/letsencrypt/live/ahmadco.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ahmadco.tech/privkey.pem;

    return 301 https://ahmadco.tech$request_uri;
}

# ── Main HTTPS Server ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ahmadco.tech;

    # Document root
    root /usr/share/nginx/html;
    index index.html;

    # ── SSL / TLS Configuration ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/ahmadco.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ahmadco.tech/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/ahmadco.tech/chain.pem;

    # Modern TLS only (Google requires TLS 1.2+)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';

    # SSL session cache
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers (Google 2025 Best Practices) ────────
    # HSTS — tell browsers to always use HTTPS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer policy (privacy + SEO signal preservation)
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy (privacy signals)
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Content Security Policy — tighten for production
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://www.clarity.ms; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── SEO Headers ─────────────────────────────────────────
    add_header X-Robots-Tag "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" always;

    # ── Performance: Gzip Compression ───────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/x-component
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/ld+json
        image/svg+xml
        image/x-icon
        font/woff
        font/woff2
        font/truetype
        font/opentype;

    # ── Performance: Brotli (if module available) ────────────
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── Buffer Tuning ─────────────────────────────────────────
    client_max_body_size 10m;
    client_body_buffer_size 128k;
    proxy_buffer_size 4k;
    proxy_buffers 4 32k;
    proxy_busy_buffers_size 64k;

    # ── Core Web Vitals: Keep-Alive ───────────────────────────
    keepalive_timeout 65;
    keepalive_requests 100;

    # ── API Proxy → Node.js Backend ──────────────────────────
    location /api/ {
        proxy_pass         http://ahmadco_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;

        # CORS for API (already handled by Express, but safe fallback)
        add_header Access-Control-Allow-Origin "https://ahmadco.tech" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ── Static Assets: CSS & JS (Long Cache + Immutable) ─────
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # ── Static Assets: Images & Fonts ────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        # Protect font CORS
        add_header Access-Control-Allow-Origin "*";
    }

    # ── robots.txt — Never Cache (Google crawls daily) ───────
    location = /robots.txt {
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
    }

    # ── sitemap.xml — Short cache for Googlebot ──────────────
    location = /sitemap.xml {
        access_log off;
        log_not_found off;
        expires 12h;
        add_header Cache-Control "public, max-age=43200";
        add_header Content-Type "application/xml; charset=UTF-8";
        add_header X-Robots-Tag "noindex" always;
    }

    # ── manifest.json ─────────────────────────────────────────
    location = /manifest.json {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "application/manifest+json; charset=UTF-8";
    }

    # ── HTML Pages — Never Cache (always fresh for Google) ───
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
    }

    # ── SPA Fallback ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Ensure HTML pages are not cached
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
        }
    }

    # ── Block Bad Bots & Scrapers ─────────────────────────────
    location ~* /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block xmlrpc, wp-admin, and common attack paths
    location ~* (wp-admin|wp-login|xmlrpc\.php|\.env|\.git) {
        deny all;
        return 404;
    }

    # ── Error Pages ──────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ── Access & Error Logging ────────────────────────────────
    access_log /var/log/nginx/ahmadco.tech-access.log combined;
    error_log  /var/log/nginx/ahmadco.tech-error.log warn;
}

# ── Local Development (HTTP only on port 8080) ────────────────
# Used when running locally without SSL certificates
server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (same as prod)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    # API Proxy
    location /api/ {
        proxy_pass         http://backend:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Static assets cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # robots.txt & sitemap
    location = /robots.txt { access_log off; expires 1h; }
    location = /sitemap.xml { access_log off; expires 1h; add_header Content-Type "application/xml; charset=UTF-8"; }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;
}
