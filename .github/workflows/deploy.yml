# ============================================================
# AHMAD & CO. — CI/CD Pipeline
# Registry : Docker Hub  (DOCKER_USERNAME / DOCKER_PAT)
# Deploy   : VM via SSH  (VM_IP / VM_USERNAME / VM_PASSWORD)
# Checkout : AHMAD_PAT   (private repo access)
# Security : pinned action SHAs, secret scanning, Trivy
# ============================================================

name: 🚀 Build & Deploy Website

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ahmadco-website
  REGISTRY:   docker.io      # Docker Hub

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1 — Security & Validation
  # ──────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.AHMAD_PAT }}   # Private repo access

      - name: Detect secrets in codebase (TruffleHog)
        uses: trufflesecurity/trufflehog@d19b4f7d3c3ece0e79e8ecf6b93be02f58d2a6e5 # v3.82.6
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified
        continue-on-error: true

      - name: Block committed .env or secret files
        run: |
          echo "🔍 Scanning for committed secrets..."
          if git ls-files | grep -E "^\.env$|^\.env\.|^secrets/" ; then
            echo "❌ CRITICAL: Secret files found in repository!"
            exit 1
          fi
          echo "✅ No secret files committed."

      - name: Validate required file structure
        run: |
          echo "📁 Checking required files..."
          test -f index.html   && echo "✅ index.html"   || { echo "❌ index.html missing";  exit 1; }
          test -d css          && echo "✅ css/"          || { echo "❌ css/ missing";        exit 1; }
          test -d js           && echo "✅ js/"           || { echo "❌ js/ missing";         exit 1; }
          test -f Dockerfile   && echo "✅ Dockerfile"    || { echo "❌ Dockerfile missing";  exit 1; }
          test -f .env.example && echo "✅ .env.example"  || echo "⚠️  .env.example missing"
          echo "✅ All required files present."

  # ──────────────────────────────────────────────────────────
  # Job 2 — Build & Push to Docker Hub
  # ──────────────────────────────────────────────────────────
  build:
    name: 🐳 Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: security
    permissions:
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-full: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.AHMAD_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbea8a986b16891c29b4b5f4af0a # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=AHMAD & CO. Website
            org.opencontainers.image.description=Enterprise Digital Transformation Agency — Dubai
            org.opencontainers.image.vendor=AHMAD & CO.
            org.opencontainers.image.url=https://ahmadco.tech

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Image pushed summary
        if: github.event_name == 'push'
        run: |
          echo "📦 Docker Hub image pushed:"
          echo "   Repository : docker.io/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}"
          echo "   Tags       : ${{ steps.meta.outputs.tags }}"
          echo "   Digest     : ${{ steps.build.outputs.digest }}"

  # ──────────────────────────────────────────────────────────
  # Job 3 — Test the container locally
  # ──────────────────────────────────────────────────────────
  test:
    name: 🧪 Test Container
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.AHMAD_PAT }}

      - name: Build test image
        run: docker build -t ${{ env.IMAGE_NAME }}:test .

      - name: Start container
        run: |
          docker run -d --name test-site -p 8080:80 \
            --read-only \
            --tmpfs /tmp \
            --tmpfs /var/cache/nginx \
            --tmpfs /var/run \
            ${{ env.IMAGE_NAME }}:test
          sleep 5

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
          echo "📡 HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed!"
            docker logs test-site
            exit 1
          fi
          echo "✅ Site is healthy!"

      - name: Verify content
        run: |
          BODY=$(curl -s http://localhost:8080)
          echo "$BODY" | grep -q "AHMAD"                  && echo "✅ Brand name found"      || echo "❌ Brand name missing"
          echo "$BODY" | grep -q "Digital Transformation"  && echo "✅ Hero headline found"   || echo "❌ Hero headline missing"
          echo "$BODY" | grep -q "DevOps"                  && echo "✅ Services found"         || echo "❌ Services missing"
          echo "$BODY" | grep -q "ahmad.dstech@gmail.com"  && echo "✅ Contact email found"   || echo "⚠️  Contact email missing"

      - name: Check security headers
        run: |
          echo "🔒 Checking security headers..."
          HEADERS=$(curl -sI http://localhost:8080)
          echo "$HEADERS" | grep -qi "X-Frame-Options"        && echo "✅ X-Frame-Options"        || echo "⚠️  X-Frame-Options missing"
          echo "$HEADERS" | grep -qi "X-Content-Type-Options"  && echo "✅ X-Content-Type-Options"  || echo "⚠️  X-Content-Type-Options missing"
          echo "$HEADERS" | grep -qi "Content-Security-Policy" && echo "✅ CSP header"              || echo "⚠️  CSP missing"
          echo "$HEADERS" | grep -qi "Referrer-Policy"         && echo "✅ Referrer-Policy"          || echo "⚠️  Referrer-Policy missing"

      - name: Scan image for vulnerabilities (Trivy)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --no-progress \
            ${{ env.IMAGE_NAME }}:test \
          || echo "⚠️  Trivy scan complete (non-blocking)"

      - name: Cleanup
        if: always()
        run: docker rm -f test-site || true

  # ──────────────────────────────────────────────────────────
  # Job 4 — Deploy to VM via SSH (password auth)
  # Runs ONLY on push to main, after build + test pass
  # ──────────────────────────────────────────────────────────
  deploy:
    name: 🚢 Deploy to Production VM
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy via SSH to VM
        uses: appleboy/ssh-action@2bbe67b1952e4571b3a9ea91c6d1ac12c47ff3f5 # v1.2.0
        with:
          host:     ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          port:     22
          timeout:  60s
          script: |
            set -e
            echo "🚀 Starting deployment — AHMAD & CO. Website"
            echo "📅 Time: $(date)"

            # ── Login to Docker Hub ──────────────────────────
            echo "${{ secrets.DOCKER_PAT }}" | \
              docker login docker.io \
                -u ${{ secrets.DOCKER_USERNAME }} \
                --password-stdin
            echo "✅ Docker Hub authenticated"

            # ── Pull the latest image ────────────────────────
            IMAGE="docker.io/${{ secrets.DOCKER_USERNAME }}/ahmadco-website:latest"
            docker pull "$IMAGE"
            echo "✅ Image pulled: $IMAGE"

            # ── Zero-downtime blue-green swap ────────────────
            # Start NEW container (different name, different port)
            docker stop  ahmadco-website-new 2>/dev/null || true
            docker rm    ahmadco-website-new 2>/dev/null || true

            docker run -d \
              --name ahmadco-website-new \
              --restart unless-stopped \
              --read-only \
              --tmpfs /tmp \
              --tmpfs /var/cache/nginx \
              --tmpfs /var/run \
              -p 8081:80 \
              "$IMAGE"

            # ── Health check on new container ─────────────────
            sleep 6
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081 || echo "000")
            echo "📡 New container health: $STATUS"

            if [ "$STATUS" != "200" ]; then
              echo "❌ New container unhealthy — aborting! Old site untouched."
              docker rm -f ahmadco-website-new
              exit 1
            fi
            echo "✅ New container healthy"

            # ── Swap: stop old, rename new ────────────────────
            docker stop  ahmadco-website 2>/dev/null || true
            docker rm    ahmadco-website 2>/dev/null || true
            docker rename ahmadco-website-new ahmadco-website

            # Re-expose on port 80 (stop temp port 8081 and re-run on 80)
            docker stop  ahmadco-website 2>/dev/null || true
            docker rm    ahmadco-website 2>/dev/null || true
            docker run -d \
              --name ahmadco-website \
              --restart unless-stopped \
              --read-only \
              --tmpfs /tmp \
              --tmpfs /var/cache/nginx \
              --tmpfs /var/run \
              -p 80:80 \
              "$IMAGE"

            # ── Final health check on port 80 ─────────────────
            sleep 4
            FINAL=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80 || echo "000")
            echo "📡 Final site health (port 80): $FINAL"

            # ── Logout & cleanup ──────────────────────────────
            docker logout docker.io
            docker image prune -f --filter "until=24h"

            echo ""
            echo "🎉 ═══════════════════════════════════════"
            echo "   AHMAD & CO. deployed successfully!"
            echo "   Site status : $FINAL"
            echo "   Image       : $IMAGE"
            echo "   Time        : $(date)"
            echo "═══════════════════════════════════════════"
