# ============================================================
# AHMAD & CO. — CI/CD Pipeline
# Build, test, and deploy the website via Docker
# ============================================================

name: 🚀 Build & Deploy Website

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IMAGE_NAME: ahmadco-website
  REGISTRY: ghcr.io

jobs:
  # ── Job 1: Lint & Validate ─────────────────────────────────
  validate:
    name: 🔍 Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        uses: anishathalye/proof-html@v2
        with:
          directory: "."
        continue-on-error: true

      - name: Check file structure
        run: |
          echo "📁 Checking required files..."
          test -f index.html && echo "✅ index.html" || echo "❌ index.html missing"
          test -d css && echo "✅ css/" || echo "❌ css/ missing"
          test -d js && echo "✅ js/" || echo "❌ js/ missing"
          test -f Dockerfile && echo "✅ Dockerfile" || echo "❌ Dockerfile missing"

  # ── Job 2: Build Docker Image ──────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        if: github.event_name == 'push'
        run: echo "📦 Image pushed → ${{ steps.meta.outputs.tags }}"

  # ── Job 3: Test Container ──────────────────────────────────
  test:
    name: 🧪 Test Container
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t ${{ env.IMAGE_NAME }}:test .

      - name: Run container
        run: |
          docker run -d --name test-site -p 8080:80 ${{ env.IMAGE_NAME }}:test
          sleep 5

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
          echo "📡 HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed!"
            docker logs test-site
            exit 1
          fi
          echo "✅ Site is healthy!"

      - name: Verify content
        run: |
          BODY=$(curl -s http://localhost:8080)
          echo "$BODY" | grep -q "AHMAD" && echo "✅ Brand name found" || echo "❌ Brand name missing"
          echo "$BODY" | grep -q "Digital Transformation" && echo "✅ Hero headline found" || echo "❌ Hero headline missing"
          echo "$BODY" | grep -q "DevOps" && echo "✅ Services content found" || echo "❌ Services missing"


          
      - name: Check security headers
        run: |
          echo "🔒 Checking security headers..."
          HEADERS=$(curl -sI http://localhost:8080)
          echo "$HEADERS" | grep -qi "X-Frame-Options" && echo "✅ X-Frame-Options" || echo "⚠️  X-Frame-Options missing"
          echo "$HEADERS" | grep -qi "X-Content-Type-Options" && echo "✅ X-Content-Type-Options" || echo "⚠️  X-Content-Type-Options missing"

      - name: Cleanup
        if: always()
        run: docker rm -f test-site || true

